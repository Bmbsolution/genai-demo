# Local dev stack for ServiceCat. Credentials here are local-only defaults
# (mirrored in servicecat-be/.env.example) — not production secrets.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: servicecat
      POSTGRES_PASSWORD: servicecat
      POSTGRES_DB: servicecat
    ports:
      # Host 5440 (not 5432) to avoid colliding with locally-installed Postgres
      # clusters (this machine already runs Postgres on 5432-5434).
      - "5440:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicecat -d servicecat"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7
    ports:
      # Host 6380 (not 6379) to avoid colliding with a locally-running Redis.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  pgdata:
