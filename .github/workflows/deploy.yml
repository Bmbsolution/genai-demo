name: Deploy

# Backend CD: on every merge to main that touches gatherly-be, build the image
# and roll Cloud Run. Infra is provisioned once by Terraform (deploy/gcp); this
# pipeline only rolls new images.
#
# The FRONTEND is NOT deployed here. Netlify builds & publishes it directly from
# GitHub on every push to main (its native Git integration — see deploy/CICD.md).
# The CLI push-deploy used to hang on GitHub runners during upload; Netlify's own
# buildbot doesn't, so we let it own the frontend.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    # Hard ref guard: deploy logic only ever runs against main, so a dispatch
    # from any other branch can't expose deploy secrets.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            backend:
              - 'gatherly-be/**'

  # --- Backend → GCP Cloud Run -----------------------------------------------
  deploy-backend:
    needs: changes
    # push: deploy when gatherly-be changed. dispatch: always (manual roll).
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && needs.changes.outputs.backend == 'true'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # Workload Identity Federation (keyless GCP auth)
    env:
      PROJECT: ${{ vars.GCP_PROJECT }}
      REGION: ${{ vars.GCP_REGION }}
      SERVICE: gatherly-api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build & push image
        run: |
          IMG="${REGION}-docker.pkg.dev/${PROJECT}/gatherly/gatherly-api"
          docker build -t "$IMG:${{ github.sha }}" -t "$IMG:latest" gatherly-be
          docker push "$IMG:${{ github.sha }}"
          docker push "$IMG:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "${REGION}-docker.pkg.dev/${PROJECT}/gatherly/gatherly-api:${{ github.sha }}" \
            --region "$REGION" --quiet
          echo "Deployed: $(gcloud run services describe "$SERVICE" --region "$REGION" --format='value(status.url)')"
