name: Deploy

# Deploy on every merge to main. Backend → Cloud Run, Frontend → Netlify.
# Each deploys only when its files changed. Infra is provisioned once by
# Terraform (deploy/gcp); this pipeline only rolls new images/builds.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Which app to deploy
        type: choice
        options: [frontend, backend, both]
        default: frontend

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    # Hard ref guard: deploy logic only ever runs against main, so a dispatch
    # from any other branch can't expose deploy secrets.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            backend:
              - 'gatherly-be/**'
            frontend:
              - 'gatherly-fe/**'

  # --- Backend → GCP Cloud Run -----------------------------------------------
  deploy-backend:
    needs: changes
    # push: deploy when gatherly-be changed. dispatch: only if target selects it.
    if: >-
      github.ref == 'refs/heads/main' &&
      ((github.event_name == 'push' && needs.changes.outputs.backend == 'true') ||
       (github.event_name == 'workflow_dispatch' && (inputs.target == 'backend' || inputs.target == 'both')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation (keyless GCP auth)
    env:
      PROJECT: ${{ vars.GCP_PROJECT }}
      REGION: ${{ vars.GCP_REGION }}
      SERVICE: gatherly-api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build & push image
        run: |
          IMG="${REGION}-docker.pkg.dev/${PROJECT}/gatherly/gatherly-api"
          docker build -t "$IMG:${{ github.sha }}" -t "$IMG:latest" gatherly-be
          docker push "$IMG:${{ github.sha }}"
          docker push "$IMG:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "${REGION}-docker.pkg.dev/${PROJECT}/gatherly/gatherly-api:${{ github.sha }}" \
            --region "$REGION" --quiet
          echo "Deployed: $(gcloud run services describe "$SERVICE" --region "$REGION" --format='value(status.url)')"

  # --- Frontend → Netlify ----------------------------------------------------
  deploy-frontend:
    needs: changes
    if: >-
      github.ref == 'refs/heads/main' &&
      ((github.event_name == 'push' && needs.changes.outputs.frontend == 'true') ||
       (github.event_name == 'workflow_dispatch' && (inputs.target == 'frontend' || inputs.target == 'both')))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatherly-fe
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: gatherly-fe/pnpm-lock.yaml
      # `netlify deploy --build` from our own CI does NOT auto-install deps (that
      # step only runs in Netlify's hosted buildbot), so install them ourselves
      # first — otherwise `pnpm build` hits "next: not found".
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # `--build` lets Netlify run the build + apply its Next.js SSR runtime
      # before publishing. netlify-cli ships two bins (netlify, ntl) — name one.
      - name: Deploy to Netlify
        run: pnpm --package=netlify-cli@17 dlx netlify deploy --build --prod --site "$NETLIFY_SITE_ID"
