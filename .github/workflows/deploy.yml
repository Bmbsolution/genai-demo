name: Deploy

# Backend CD: on every merge to main that touches gatherly-be, deploy it to
# Railway (Dockerfile build, `railway up`). Railway hosts the FastAPI service +
# managed Postgres — we moved off GCP Cloud Run because the org policy blocked
# public access (see deploy/CICD.md).
#
# The FRONTEND is NOT deployed here. Netlify owns it (its env points at the
# Railway API URL); see deploy/CICD.md.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    # Hard ref guard: deploy logic only ever runs against main, so a dispatch
    # from any other branch can't expose deploy secrets.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'gatherly-be/**'

  # --- Backend → Railway ------------------------------------------------------
  deploy-backend:
    needs: changes
    # push: deploy when gatherly-be changed. dispatch: always (manual roll).
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && needs.changes.outputs.backend == 'true'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy gatherly-be to Railway
        working-directory: gatherly-be
        env:
          # Project-scoped token from Railway → project "gatherly" → Settings →
          # Tokens (scoped to the production environment). Add it as the repo
          # secret RAILWAY_TOKEN.
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        # --ci streams build logs, waits for the deploy to finish, and exits
        # non-zero on failure (so a broken deploy fails the job).
        run: railway up --service gatherly-be --ci
