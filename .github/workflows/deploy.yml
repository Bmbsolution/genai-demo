name: Deploy

# Deploy on every merge to main. Backend → Cloud Run, Frontend → Netlify.
# Each deploys only when its files changed. Infra is provisioned once by
# Terraform (deploy/gcp); this pipeline only rolls new images/builds.
on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'gatherly-be/**'
            frontend:
              - 'gatherly-fe/**'

  # --- Backend → GCP Cloud Run -----------------------------------------------
  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation (keyless GCP auth)
    env:
      PROJECT: ${{ vars.GCP_PROJECT }}
      REGION: ${{ vars.GCP_REGION }}
      SERVICE: gatherly-api
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build & push image
        run: |
          IMG="${REGION}-docker.pkg.dev/${PROJECT}/gatherly/gatherly-api"
          docker build -t "$IMG:${{ github.sha }}" -t "$IMG:latest" gatherly-be
          docker push "$IMG:${{ github.sha }}"
          docker push "$IMG:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "${REGION}-docker.pkg.dev/${PROJECT}/gatherly/gatherly-api:${{ github.sha }}" \
            --region "$REGION" --quiet
          echo "Deployed: $(gcloud run services describe "$SERVICE" --region "$REGION" --format='value(status.url)')"

  # --- Frontend → Netlify ----------------------------------------------------
  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatherly-fe
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: gatherly-fe/pnpm-lock.yaml
      # `--build` lets Netlify run the build + apply its Next.js SSR runtime
      # (turning the app into serverless functions) before publishing.
      - name: Deploy to Netlify
        run: pnpm dlx netlify-cli@17 deploy --build --prod
